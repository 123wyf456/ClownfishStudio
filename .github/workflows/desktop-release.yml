name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: windows
            venv_python: .venv/Scripts/python.exe
            build_command: npx electron-builder --win portable --publish never
          - name: macOS Intel
            os: macos-15-intel
            artifact_name: macos-x64
            venv_python: .venv/bin/python
            build_command: npx electron-builder --mac dmg zip --x64 --publish never
          - name: macOS Apple Silicon
            os: macos-15
            artifact_name: macos-arm64
            venv_python: .venv/bin/python
            build_command: npx electron-builder --mac dmg zip --arm64 --publish never

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: server/uv.lock

      - name: Create server virtual environment
        working-directory: server
        run: python -m venv --copies .venv

      - name: Install server test dependencies
        working-directory: server
        run: uv sync --locked --extra dev --link-mode copy --python ${{ matrix.venv_python }}

      - name: Test server
        working-directory: server
        run: |
          uv run --locked --python ${{ matrix.venv_python }} pytest -q
          uv run --locked --python ${{ matrix.venv_python }} ruff check .

      - name: Install server runtime dependencies
        working-directory: server
        run: uv sync --locked --link-mode copy --python ${{ matrix.venv_python }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop renderer
        working-directory: desktop
        run: npm run build

      - name: Package desktop app
        working-directory: desktop
        run: ${{ matrix.build_command }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ClownfishStudio-${{ matrix.artifact_name }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "ClownfishStudio $RELEASE_TAG" \
              --notes "Automated Windows and macOS desktop builds."
          fi
