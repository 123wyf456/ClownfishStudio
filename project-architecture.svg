<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1180" viewBox="0 0 1440 1180" role="img" aria-labelledby="title desc">
  <title id="title">ClownfishStudio Project Architecture</title>
  <desc id="desc">Layered architecture diagram showing Desktop UI, Electron bridge, FastAPI API, services, agent runtime, tools, data, and external services.</desc>
  <defs>
    <style>
      .bg { fill: #08111f; }
      .panel { fill: #111a2c; stroke: #263956; stroke-width: 1.5; }
      .client { fill: #13283a; stroke: #3d6684; }
      .bridge { fill: #182439; stroke: #5a6f96; }
      .api { fill: #172d2a; stroke: #4c8179; }
      .service { fill: #24233a; stroke: #7b74a8; }
      .agent { fill: #331f35; stroke: #b06aa8; }
      .tool { fill: #2a2d1d; stroke: #8d9254; }
      .data { fill: #302517; stroke: #9a7545; }
      .external { fill: #1f2530; stroke: #606d7b; }
      .label { fill: #f4f7fb; font-family: "Segoe UI", "Noto Sans SC", Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .small { fill: #cbd5e1; font-family: "Segoe UI", "Noto Sans SC", Arial, sans-serif; font-size: 17px; }
      .tiny { fill: #96a3b4; font-family: "Segoe UI", "Noto Sans SC", Arial, sans-serif; font-size: 14px; }
      .title { fill: #ffffff; font-family: "Segoe UI", "Noto Sans SC", Arial, sans-serif; font-size: 38px; font-weight: 800; }
      .subtitle { fill: #aeb9cb; font-family: "Segoe UI", "Noto Sans SC", Arial, sans-serif; font-size: 18px; }
      .arrow { stroke: #9fb3c8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #74869a; stroke-width: 1.8; fill: none; marker-end: url(#arrowSoft); stroke-dasharray: 6 6; }
      .boundary { fill: none; stroke: #46556a; stroke-width: 1.2; stroke-dasharray: 8 8; }
      .note { fill: #f0d9a8; font-family: "Segoe UI", "Noto Sans SC", Arial, sans-serif; font-size: 17px; font-weight: 600; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9fb3c8"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#74869a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="1180"/>
  <text class="title" x="70" y="70">ClownfishStudio 项目架构</text>
  <text class="subtitle" x="70" y="104">Agent 主导理解与编排，工具提供事实和候选，客户端负责交互和播放，后端负责运行与持久化。</text>

  <rect class="boundary" x="52" y="136" width="1336" height="270" rx="18"/>
  <text class="tiny" x="72" y="164">Client Runtime</text>

  <rect class="client" x="90" y="190" width="350" height="150" rx="14"/>
  <text class="label" x="118" y="230">Desktop UI 层</text>
  <text class="small" x="118" y="264">desktop/src</text>
  <text class="tiny" x="118" y="296">Radio / Player / Chat / Settings</text>
  <text class="tiny" x="118" y="320">采集设备上下文，展示节目并播放</text>

  <rect class="bridge" x="545" y="190" width="350" height="150" rx="14"/>
  <text class="label" x="573" y="230">Electron 桥接层</text>
  <text class="small" x="573" y="264">desktop/electron</text>
  <text class="tiny" x="573" y="296">preload IPC / api-clients / main</text>
  <text class="tiny" x="573" y="320">启动后端，管理配置、日志、音频缓存</text>

  <rect class="external" x="1000" y="190" width="300" height="150" rx="14"/>
  <text class="label" x="1028" y="230">本地运行环境</text>
  <text class="small" x="1028" y="264">Electron userData</text>
  <text class="tiny" x="1028" y="296">desktop-settings.json</text>
  <text class="tiny" x="1028" y="320">cached-music / desktop logs</text>

  <path class="arrow" d="M440 265 C475 265 505 265 545 265"/>
  <text class="tiny" x="464" y="250">window.clownfishApi</text>
  <path class="arrow-soft" d="M895 265 C930 265 960 265 1000 265"/>
  <text class="tiny" x="918" y="250">local files</text>

  <rect class="boundary" x="52" y="448" width="1336" height="520" rx="18"/>
  <text class="tiny" x="72" y="476">Local FastAPI Backend</text>

  <rect class="api" x="90" y="520" width="350" height="150" rx="14"/>
  <text class="label" x="118" y="560">FastAPI API 层</text>
  <text class="small" x="118" y="594">server/app/api</text>
  <text class="tiny" x="118" y="626">/station/generate / chat / config</text>
  <text class="tiny" x="118" y="650">只做请求响应和 schema 边界</text>

  <rect class="service" x="545" y="520" width="350" height="150" rx="14"/>
  <text class="label" x="573" y="560">服务编排层</text>
  <text class="small" x="573" y="594">server/app/services</text>
  <text class="tiny" x="573" y="626">StationOrchestrator</text>
  <text class="tiny" x="573" y="650">ProgramGenerationService</text>

  <rect class="agent" x="1000" y="520" width="300" height="150" rx="14"/>
  <text class="label" x="1028" y="560">Agent 层</text>
  <text class="small" x="1028" y="594">server/app/agents</text>
  <text class="tiny" x="1028" y="626">RadioAgentRuntime</text>
  <text class="tiny" x="1028" y="650">节目、问候、聊天回复、点歌理解</text>

  <rect class="tool" x="90" y="760" width="350" height="150" rx="14"/>
  <text class="label" x="118" y="800">工具与 Provider 层</text>
  <text class="small" x="118" y="834">server/app/tools</text>
  <text class="tiny" x="118" y="866">weather / memory / history</text>
  <text class="tiny" x="118" y="890">music / podcast / feedback / TTS</text>

  <rect class="data" x="545" y="760" width="350" height="150" rx="14"/>
  <text class="label" x="573" y="800">数据层</text>
  <text class="small" x="573" y="834">SQLite + data/mock</text>
  <text class="tiny" x="573" y="866">session / chat history / current item</text>
  <text class="tiny" x="573" y="890">mock JSON / generated audio</text>

  <rect class="external" x="1000" y="760" width="300" height="150" rx="14"/>
  <text class="label" x="1028" y="800">外部服务</text>
  <text class="small" x="1028" y="834">Live Integrations</text>
  <text class="tiny" x="1028" y="866">DeepSeek / OpenWeather</text>
  <text class="tiny" x="1028" y="890">NetEase Cloud Music / Fish Audio</text>

  <path class="arrow" d="M720 340 L720 520"/>
  <text class="tiny" x="742" y="438">HTTP 127.0.0.1:8000</text>

  <path class="arrow" d="M440 595 C475 595 505 595 545 595"/>
  <text class="tiny" x="466" y="580">validated request</text>

  <path class="arrow" d="M895 595 C930 595 960 595 1000 595"/>
  <text class="tiny" x="914" y="580">context + candidates</text>

  <path class="arrow-soft" d="M720 670 L720 760"/>
  <text class="tiny" x="742" y="718">persist session</text>

  <path class="arrow-soft" d="M545 620 C490 650 432 718 350 760"/>
  <text class="tiny" x="398" y="708">facts + candidates</text>

  <path class="arrow-soft" d="M440 835 C475 835 505 835 545 835"/>
  <text class="tiny" x="468" y="820">read/write</text>

  <path class="arrow-soft" d="M440 795 C640 700 825 695 1000 805"/>
  <text class="tiny" x="652" y="714">provider calls</text>

  <path class="arrow" d="M1150 760 L1150 670"/>
  <text class="tiny" x="1172" y="718">model output</text>

  <rect class="panel" x="90" y="1014" width="1210" height="92" rx="14"/>
  <text class="note" x="120" y="1052">边界规则：</text>
  <text class="small" x="220" y="1052">客户端不碰模型密钥；API 不写业务逻辑；工具不做主推荐；Agent 只能从候选中选择并通过 schema 校验。</text>
  <text class="small" x="220" y="1084">聊天、问候、推荐方向和节目编排都由 Agent 理解和生成，服务层只负责组织上下文、兜底、日志和持久化。</text>
</svg>
